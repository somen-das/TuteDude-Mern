<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./style.css"/>
    
    <title>Document</title>
</head>
<body>
    <header>
        <nav class="navHeader">
            <h3 class="navh3" id="header-id">Hello</h3>
        </nav>
        
        <main>
            <div class="colorboxsec">
                <div class="box" onclick="changeBoxColor(this, 'red')">red</div>
                <div class="box" onclick="changeBoxColor(this, 'blue')">blue</div>
                <div class="box" onclick="changeBoxColor(this, 'green')">green</div>
                <div class="box" onclick="changeBoxColor(this, 'yellow')">yellow</div>
            </div>
            <div class="form">
                <input 
                type="text"
                value=""
                id="nameInput"
                class="name"
                placeholder="Enter Your Name"
                >
                <button class="greatBtn" id="great-btn-id">Great</button>
            </div>
        </main>
    </header>
    <script src="./script.js"></script>
</body>
</html>
